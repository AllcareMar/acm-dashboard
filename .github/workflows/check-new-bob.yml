name: ACM BOB Auto-Refresh

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: bob-refresh
  cancel-in-progress: false

jobs:
  check-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: FORCED INITIAL BOOTSTRAP
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          GDRIVE_NEW_FOLDER_ID:    ${{ secrets.GDRIVE_NEW_FOLDER_ID }}
          GDRIVE_ARCHIVE_FOLDER_ID: ${{ secrets.GDRIVE_ARCHIVE_FOLDER_ID }}
          GMAIL_SENDER:            ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS:        ${{ secrets.EMAIL_RECIPIENTS }}
          DASHBOARD_URL:           ${{ secrets.DASHBOARD_URL }}
        run: |
          # 1. Descargamos el archivo de Drive
          python scripts/check_and_process.py || true
          
          # 2. Localizamos la carpeta temporal
          TEMP_DIR=$(find /tmp -name "acm_bob_*" -type d | head -n 1)
          
          # 3. Creamos el archivo maestro y forzamos su ubicación en ./data/
          if [ -n "$TEMP_DIR" ]; then
            python scripts/setup_initial_data.py "$TEMP_DIR"
            # Movemos el archivo generado a la carpeta data por si el script lo dejó en otro lado
            find . -name "snapshots_master.pkl" -exec mv {} ./data/ \;
          else
            echo "Error: No se descargó el archivo de Drive."
            exit 1
          fi

      - name: Force Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Verificamos si el archivo existe antes de subirlo
          ls -l data/
          
          git add data/snapshots_master.pkl
          git commit -m "Bootstrap: Hard-fix master snapshots file" || echo "No changes to commit"
          git push origin main

  deploy-pages:
    needs: check-and-process
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
