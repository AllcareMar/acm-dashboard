name: ACM BOB Auto-Refresh

on:
  schedule:
    # Every 10 minutes (GitHub Actions has ~5-15 min real latency)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Allow manual trigger from Actions tab

# Only one run at a time - prevent concurrent processing
concurrency:
  group: bob-refresh
  cancel-in-progress: false

jobs:
  check-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write  # needed to push updated index.html, JSX and state.json
      pages: write     # needed for GitHub Pages deployment
      id-token: write  # needed for GitHub Pages OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # full history for git operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BOB refresh check
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          GDRIVE_NEW_FOLDER_ID:    ${{ secrets.GDRIVE_NEW_FOLDER_ID }}
          GDRIVE_ARCHIVE_FOLDER_ID: ${{ secrets.GDRIVE_ARCHIVE_FOLDER_ID }}
          GMAIL_SENDER:            ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS:        ${{ secrets.EMAIL_RECIPIENTS }}
          DASHBOARD_URL:           ${{ secrets.DASHBOARD_URL }}
        run: |
          python scripts/check_and_process.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"        
          git add -f data/snapshots_master.pkl
          git add state.json data/retention_data.json
          
          git commit -m "Automated update: BOB data and trends" || echo "No changes to commit"
          git push origin main
  
# Deploy index.html to GitHub Pages whenever main branch changes
  deploy-pages:
    needs: check-and-process
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
